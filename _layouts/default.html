<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  {% include header.html %}

  <main class="content-wrap">
    <article class="page-content">
      {%- comment -%}
        Place the slides embed between the Readings section and the next
        section (typically Discussion Prompt). Splitting the rendered HTML
        on the `<h2` token lets us insert the iframe between sections[1]
        (Readings) and sections[2] (next h2 block). With fewer than two h2
        headings, the embed is appended at the end.
      {%- endcomment -%}
      {%- if page.slides -%}
        {%- assign sections = content | split: '<h2' -%}
        {%- if sections.size >= 3 -%}
          {{ sections[0] }}<h2{{ sections[1] }}
          {%- include slides-embed.html slug=page.slides -%}
          {%- assign last = sections.size | minus: 1 -%}
          {%- for i in (2..last) -%}<h2{{ sections[i] }}{%- endfor -%}
        {%- else -%}
          {{ content }}
          {%- include slides-embed.html slug=page.slides -%}
        {%- endif -%}
      {%- else -%}
        {{ content }}
      {%- endif -%}
    </article>
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/trail.js' | relative_url }}"></script>
</body>
</html>
